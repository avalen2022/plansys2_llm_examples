# EasyNav configuration for Kobuki in the AWS bookstore simulation
# Robot: differential drive, ~0.35m diameter, 0.223m wheel separation
# Sensors: 2D LiDAR (LaserScan), RGBD camera, wheel odometry
#
# Costmap stack: CostmapMapsManager + CostmapPlanner + SerestController
# Map from slam_toolbox (Jazzy workspace), Nav2 PGM+YAML format

controller_node:
  ros__parameters:
    use_sim_time: true
    controller_types: [serest]
    serest:
      rt_freq: 30.0
      freq: 30.0
      plugin: easynav_serest_controller/SerestController
      max_linear_speed: 0.3
      max_angular_speed: 1.5
      max_linear_acc: 0.8
      max_angular_acc: 2.0
      d0_margin: 0.05
      goal_yaw_tol_deg: 180.0

localizer_node:
  ros__parameters:
    use_sim_time: true
    localizer_types: [costmap]
    costmap:
      rt_freq: 30.0
      freq: 10.0
      reseed_freq: 2.0
      plugin: easynav_costmap_localizer/AMCLLocalizer
      num_particles: 150
      initial_pose:
        x: 0.0
        y: 0.0
        yaw: 0.0
        std_dev_xy: 0.20
        std_dev_yaw: 0.07
      noise_translation: 0.01
      noise_rotation: 0.02
      noise_translation_to_rotation: 0.02
      min_noise_xy: 0.01
      min_noise_yaw: 0.01

maps_manager_node:
  ros__parameters:
    use_sim_time: true
    map_types: [costmap]
    costmap:
      freq: 10.0
      plugin: easynav_costmap_maps_manager/CostmapMapsManager
      package: plan_bookstore
      map_path_file: maps/bookstore_map.yaml
      filters: [obstacles, inflation]
      obstacles:
        plugin: easynav_costmap_maps_manager/CostmapMapsManager/ObstaclesFilter
      inflation:
        plugin: easynav_costmap_maps_manager/CostmapMapsManager/InflationFilter
        inflation_radius: 0.30
        inscribed_radius: 0.18
        cost_scaling_factor: 3.0

planner_node:
  ros__parameters:
    use_sim_time: true
    planner_types: [costmap]
    costmap:
      freq: 10.0
      plugin: easynav_costmap_planner/CostmapPlanner
      cost_factor: 10.0

sensors_node:
  ros__parameters:
    use_sim_time: true
    forget_time: 0.5
    sensors: [laser1]
    perception_default_frame: odom
    laser1:
      topic: /scan_raw
      type: sensor_msgs/msg/LaserScan

system_node:
  ros__parameters:
    use_sim_time: true
    position_tolerance: 0.5
    angle_tolerance: 6.28
